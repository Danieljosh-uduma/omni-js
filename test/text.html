<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Omni Framework — Browser Test</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        #status { padding: 0.75rem; border-radius: 6px; margin-bottom: 1.5rem; font-family: monospace; white-space: pre-wrap; }
        #status.ok { background: #e6f4ea; color: #1e4620; }
        #status.error { background: #fce8e6; color: #5f2120; }
        #app { border: 1px dashed #ccc; padding: 1rem; border-radius: 6px; }
        table { border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 0.4rem 0.8rem; text-align: left; }
        header, footer { background: #f5f5f5; padding: 0.5rem 1rem; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Omni Runtime — Browser Smoke Test</h1>
    <div id="status">Loading demo.omni...</div>
    <div id="app"></div>

    <script type="module" src="./app.js"></script>
</body>
</html>
